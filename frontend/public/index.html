        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "DefinedTermSet",
            "name": "Cybersecurity & IT Terms",
            "description": "Key cybersecurity and managed IT terms defined by Veracity Technologies",
            "hasDefinedTerm": [
                {
                    "@type": "DefinedTerm",
                    "name": "Shadow AI",
                    "description": "The use of artificial intelligence tools and services by employees without the knowledge, approval, or governance of the IT or security team. Shadow AI creates data leakage risks and compliance violations when sensitive information is shared with unauthorized AI platforms."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "OT/IT Convergence",
                    "description": "The integration of operational technology (PLCs, SCADA, HMIs) with information technology (servers, cloud, email) in manufacturing and industrial environments. This convergence creates new attack surfaces requiring specialized network segmentation and monitoring."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "CMMC",
                    "description": "Cybersecurity Maturity Model Certification. A framework required by the U.S. Department of Defense for contractors handling Controlled Unclassified Information (CUI). CMMC 2.0 defines three levels of cybersecurity maturity that defense supply chain organizations must achieve."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Business Email Compromise",
                    "description": "A cyberattack where criminals gain access to or spoof a business email account to redirect wire transfers, steal data, or manipulate financial transactions. BEC is the most costly form of cybercrime, causing over $2.7 billion in losses annually according to the FBI."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Zero Trust Architecture",
                    "description": "A security framework that requires all users, devices, and applications to be continuously verified before accessing resources, regardless of whether they are inside or outside the network perimeter. Zero trust eliminates implicit trust and enforces least-privilege access."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Managed Service Provider (MSP)",
                    "description": "A third-party company that remotely manages a customer's IT infrastructure, cybersecurity, and technology systems on a proactive basis. MSPs provide 24/7 monitoring, help desk support, network management, and strategic IT consulting."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "SOC 2",
                    "description": "System and Organization Controls 2. A framework developed by the AICPA that evaluates an organization's controls related to security, availability, processing integrity, confidentiality, and privacy. SOC 2 Type II audits evaluate operating effectiveness over a period of 6-12 months."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Ransomware",
                    "description": "Malicious software that encrypts an organization's data and demands payment for the decryption key. Ransomware attacks rose 32% globally in 2025, with average ransom payments reaching $2.3 million. Manufacturing is the #1 targeted industry."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "SCADA",
                    "description": "Supervisory Control and Data Acquisition. Industrial control systems used to monitor and control manufacturing processes, utilities, and infrastructure. SCADA systems are increasingly targeted by cyberattacks as they connect to IT networks, requiring specialized OT security."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Multi-Factor Authentication (MFA)",
                    "description": "A security method requiring users to provide two or more verification factors to access a resource. MFA significantly reduces the risk of credential-based attacks, which account for 59% of confirmed security incidents (eSentire 2026)."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Endpoint Detection and Response (EDR)",
                    "description": "A cybersecurity technology that continuously monitors endpoint devices (computers, servers, mobile devices) for suspicious activity and provides automated response capabilities to contain and remediate threats in real time."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "PCI-DSS",
                    "description": "Payment Card Industry Data Security Standard. A set of security requirements for organizations that handle credit card data. PCI-DSS compliance is mandatory for businesses processing card payments and includes requirements for encryption, access control, monitoring, and regular testing."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "HIPAA",
                    "description": "Health Insurance Portability and Accountability Act. U.S. federal law that sets standards for protecting sensitive patient health information (PHI). Healthcare organizations, insurers, and business associates must implement technical, physical, and administrative safeguards."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Disaster Recovery Plan (DRP)",
                    "description": "A documented strategy for recovering IT systems, data, and operations following a cyberattack, natural disaster, or hardware failure. A tested DRP can restore operations in hours rather than days, minimizing financial losses and operational downtime."
                },
                {
                    "@type": "DefinedTerm",
                    "name": "Phishing",
                    "description": "A social engineering attack where criminals send fraudulent messages designed to trick recipients into revealing sensitive information, clicking malicious links, or transferring funds. AI-generated phishing emails are now virtually indistinguishable from legitimate correspondence."
                }
            ]
        }
